
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Little Something For You 🐻</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Lato:wght@300;400&family=Nunito:wght@800&display=swap');
 
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
  :root {
    --dark-brown: #2a1a0e;
    --mid-brown: #3d2410;
    --beige: #f0e6d0;
    --beige-dark: #d9c9a8;
    --beige-shadow: #c4af8a;
    --gold: #c9a84c;
    --text-brown: #3d2410;
  }
 
  body {
    background: var(--dark-brown);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Lato', sans-serif;
    overflow: hidden;
    position: relative;
  }
 
  /* subtle paper texture dots */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 28px 28px;
    pointer-events: none;
    z-index: 0;
  }
 
  .scene {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }
 
  .hint {
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 15px;
    color: rgba(240,230,208,0.5);
    letter-spacing: 0.04em;
    transition: opacity 0.5s;
    text-align: center;
  }
 
  /* ===================== ORIGAMI STAGES ===================== */
  .origami-wrapper {
    cursor: pointer;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 480px;
    height: 480px;
    transition: transform 0.15s;
  }
  .origami-wrapper:hover { transform: scale(1.02); }
  .origami-wrapper:active { transform: scale(0.97); }
 
  .origami-stage {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.6s ease, transform 0.6s ease;
    pointer-events: none;
    transform: scale(0.92) rotateX(8deg);
  }
  .origami-stage.active {
    opacity: 1;
    pointer-events: auto;
    transform: scale(1) rotateX(0deg);
  }
  .origami-stage svg {
    filter: drop-shadow(0 12px 32px rgba(0,0,0,0.55)) drop-shadow(0 2px 6px rgba(0,0,0,0.3));
  }
 
  /* fold-out animation */
  .origami-stage.unfolding {
    animation: unfoldPop 0.55s cubic-bezier(0.22,1,0.36,1) forwards;
  }
  @keyframes unfoldPop {
    0%   { transform: scale(0.8) rotateX(20deg); opacity: 0; }
    60%  { transform: scale(1.06) rotateX(-3deg); opacity: 1; }
    100% { transform: scale(1) rotateX(0deg); opacity: 1; }
  }
 
  /* ===================== CARD SECTION ===================== */
  .card-section {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(20,10,4,0.85);
    backdrop-filter: blur(6px);
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
  }
  .card-section.visible {
    display: flex;
    animation: fadeInSection 0.7s ease forwards;
  }
  @keyframes fadeInSection {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
 
  .card-stack {
    position: relative;
    width: 540px;
    height: 360px;
    max-width: 96vw;
  }
 
  .card {
    position: absolute;
    inset: 0;
    background: var(--beige);
    border-radius: 4px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 4px 12px rgba(0,0,0,0.3);
    overflow: hidden;
    opacity: 0;
    transform: translateY(30px) scale(0.95);
    transition: opacity 0.55s ease, transform 0.55s ease;
    pointer-events: none;
  }
  .card.active {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: auto;
    z-index: 2;
  }
  .card.prev {
    opacity: 0;
    transform: translateX(-20px) scale(0.97) rotate(-1deg);
    z-index: 1;
  }
 
  /* full-bleed image fills the whole postcard */
  .card-image-slot {
    width: 100%;
    height: 100%;
    overflow: hidden;
  }
  .card-image-slot img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
 
  /* nav */
  .card-nav {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .nav-btn {
    background: none;
    border: 1.5px solid rgba(240,230,208,0.3);
    color: rgba(240,230,208,0.7);
    width: 40px; height: 40px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .nav-btn:hover {
    border-color: rgba(240,230,208,0.8);
    color: rgba(240,230,208,1);
    background: rgba(240,230,208,0.08);
  }
  .nav-btn:disabled {
    opacity: 0.2;
    cursor: default;
  }
  .card-counter {
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 14px;
    color: rgba(240,230,208,0.5);
    letter-spacing: 0.04em;
    min-width: 60px;
    text-align: center;
  }

  /* ===================== ORIGAMI STAGE IMAGES ===================== */
  .stage-img {
    height: auto;
    filter: drop-shadow(0 12px 32px rgba(0,0,0,0.55)) drop-shadow(0 2px 6px rgba(0,0,0,0.3));
  }
  #stage0 .stage-img { width: 440px; }
  #stage1 .stage-img { width: 410px; }
  #stage2 .stage-img { width: 380px; }

  /* ===================== BIRTHDAY CARD (STAGE 3) ===================== */
  .birthday-card {
    width: 340px;
    height: 220px;
    background: #f2ede0;
    border-radius: 6px;
    box-shadow: 0 12px 32px rgba(0,0,0,0.55), 0 2px 6px rgba(0,0,0,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 8px;
    border: 2px solid var(--gold);
    padding: 16px;
  }
  .birthday-card-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 400;
    color: var(--text-brown);
    text-align: center;
    line-height: 1.3;
  }
</style>
</head>
<body>
 
<div class="scene">
  <p class="hint" id="hint">tap the bear to unfold…</p>
 
  <div class="origami-wrapper" id="origamiWrapper" onclick="handleClick()">
 
    <!-- STAGE 0: Finished Bear — YOUR IMAGE -->
    <!-- ✏️ EDIT: replace "bear.png" with your image filename -->
    <div class="origami-stage active" id="stage0">
      <img src="bear1.png" class="stage-img" alt="origami bear">
    </div>
 
    <!-- STAGE 1: Unfolding step 1 — YOUR IMAGE -->
    <!-- ✏️ EDIT: replace "step1.png" with your image filename -->
    <div class="origami-stage" id="stage1">
      <img src="bear2.png" class="stage-img" alt="unfolding step 1">
    </div>
 
    <!-- STAGE 2: Unfolding step 2 — YOUR IMAGE -->
    <!-- ✏️ EDIT: replace "step2.png" with your image filename -->
    <div class="origami-stage" id="stage2">
      <img src="bear3.png" class="stage-img" alt="unfolding step 2">
    </div>
 
  </div><!-- origami-wrapper -->
</div><!-- scene -->
 
<!-- ===================== CARD SECTION ===================== -->
<div class="card-section" id="cardSection">
  <div class="card-stack" id="cardStack">
 
    <!-- ═══════════════════════════════════════════
         CARD 1  ✏️ change "card1.jpg" to your image filename
    ═══════════════════════════════════════════ -->
    <div class="card active" id="card0">
      <div class="card-image-slot">
        <img src="Frame 1.png" alt="card 1"/>
      </div>
    </div>
 
    <!-- ═══════════════════════════════════════════
         CARD 2  ✏️ change "card2.jpg" to your image filename
    ═══════════════════════════════════════════ -->
    <div class="card" id="card1">
      <div class="card-image-slot">
        <img src="Frame 2.png" alt="card 2"/>
      </div>
    </div>
 
    <!-- ═══════════════════════════════════════════
         CARD 3  ✏️ change "card3.jpg" to your image filename
    ═══════════════════════════════════════════ -->
    <div class="card" id="card2">
      <div class="card-image-slot">
        <img src="Frame 3.png" alt="card 3"/>
      </div>
    </div>
 
    <!-- ═══════════════════════════════════════════
         CARD 4  ✏️ change "card4.jpg" to your image filename
    ═══════════════════════════════════════════ -->
    <div class="card" id="card3">
      <div class="card-image-slot">
        <img src="Frame 4.png" alt="card 4"/>
      </div>
    </div>
 
    <!-- ═══════════════════════════════════════════
         CARD 5  ✏️ change "card5.jpg" to your image filename
    ═══════════════════════════════════════════ -->
    <div class="card" id="card4">
      <div class="card-image-slot">
        <img src="Frame 5.png" alt="card 5"/>
      </div>
    </div>

    <div class="card" id="card5">
      <div class="card-image-slot">
        <img src="Frame 6.png" alt="card 5"/>
      </div>
    </div>

    <div class="card" id="card6">
      <div class="card-image-slot">
        <img src="Frame 7.png" alt="card 5"/>
      </div>
    </div>
 

    <div class="card" id="card7">
      <div class="card-image-slot">
        <img src="Frame 8.png" alt="card 5"/>
      </div>
    </div>


 
  </div><!-- card-stack -->
 
  <div class="card-nav">
    <button class="nav-btn" id="prevBtn" onclick="navigate(-1)" disabled>←</button>
    <span class="card-counter" id="cardCounter">1 / 8</span>
    <button class="nav-btn" id="nextBtn" onclick="navigate(1)">→</button>
  </div>
</div>
 
<script>
  const TOTAL_STAGES = 3; // 0=bear, 1=step1, 2=step2, then opens
  const TOTAL_CARDS  = 8;
  let currentStage = 0;
  let currentCard  = 0;
  let isAnimating  = false;
 
  const hints = [
    "tap the bear to unfold…",
    "one more unfold…",
    "tap to open your card ✦"
  ];
 
  function handleClick() {
    if (isAnimating) return;
    isAnimating = true;
 
    if (currentStage < TOTAL_STAGES - 1) {
      // hide current stage
      const curr = document.getElementById('stage' + currentStage);
      curr.classList.remove('active');
 
      currentStage++;
      const next = document.getElementById('stage' + currentStage);
      next.classList.add('active', 'unfolding');
      next.addEventListener('animationend', () => {
        next.classList.remove('unfolding');
        isAnimating = false;
      }, { once: true });
 
      document.getElementById('hint').textContent = hints[currentStage];
 
    } else {
      // open cards
      document.getElementById('cardSection').classList.add('visible');
      isAnimating = false;
      initImages();
    }
  }
 
  function navigate(dir) {
    const next = currentCard + dir;
    if (next < 0 || next >= TOTAL_CARDS) return;
 
    const curr = document.getElementById('card' + currentCard);
    curr.classList.remove('active');
    curr.classList.add('prev');
    setTimeout(() => curr.classList.remove('prev'), 600);
 
    currentCard = next;
    const nextEl = document.getElementById('card' + currentCard);
    nextEl.classList.add('active');
 
    document.getElementById('cardCounter').textContent = (currentCard + 1) + ' / ' + TOTAL_CARDS;
    document.getElementById('prevBtn').disabled = currentCard === 0;
    document.getElementById('nextBtn').disabled = currentCard === TOTAL_CARDS - 1;
  }
 
  function initImages() { /* images load automatically */ }
 
  // keyboard support
  document.addEventListener('keydown', (e) => {
    if (document.getElementById('cardSection').classList.contains('visible')) {
      if (e.key === 'ArrowRight') navigate(1);
      if (e.key === 'ArrowLeft')  navigate(-1);
    } else {
      if (e.key === 'Enter' || e.key === ' ') handleClick();
    }
  });
</script>
 
<!--
  ════════════════════════════════════════════════════════
  HOW TO CUSTOMISE THIS CARD
  ════════════════════════════════════════════════════════
 
  1. PUT ALL YOUR IMAGE FILES in the same folder as this HTML file.
 
  2. ORIGAMI STAGES — find these 4 lines near the top and
     change the filename to match your image:
       src="bear.png"   → your finished bear image
       src="step1.png"  → your unfolding step 1 image
       src="step2.png"  → your unfolding step 2 image
       src="step3.png"  → your unfolding step 3 image
 
  3. CARDS — each card has a comment like "CARD 1", "CARD 2" etc.
     For each card, change:
       src="card1.jpg"           → your photo filename
       Your Title Here           → your title text
       Your message here.        → your message text
 
  ════════════════════════════════════════════════════════
-->
</body>
</html>
